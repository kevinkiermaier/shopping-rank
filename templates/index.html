<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>쇼핑 키워드 분석</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .search-bar { background: #343a40; padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .search-bar input { flex: 1; min-width: 200px; max-width: 400px; }
    .platform-tabs .nav-link { color: #495057; font-weight: 600; }
    .platform-tabs .nav-link.active { color: #007bff; border-bottom: 3px solid #007bff; }
    .limit-badge { font-size: 12px; color: #adb5bd; }
    .score-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; }
    .score-5 { color: #28a745; font-weight: 700; }
    .score-4 { color: #17a2b8; font-weight: 700; }
    .score-3 { color: #ffc107; font-weight: 700; }
    .score-2 { color: #fd7e14; font-weight: 700; }
    .score-1 { color: #dc3545; font-weight: 700; }
    .grade-good { background: #28a745; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
    .product-img { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; }
    .product-title { font-size: 13px; max-width: 260px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .product-title a { color: #343a40; }
    .product-title a:hover { color: #007bff; }
    .rank-num { font-weight: 700; font-size: 16px; color: #495057; }
    .rank-1 { color: #f39c12; }
    .rank-2 { color: #6c757d; }
    .rank-3 { color: #cd7f32; }
    #result-table th { font-size: 11px; white-space: nowrap; text-align: center; vertical-align: middle; }
    #result-table td { font-size: 12px; text-align: center; vertical-align: middle; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 9999; justify-content: center; align-items: center; }
    .loading-overlay.show { display: flex; }
    .expiry-badge { font-size: 12px; color: #ffc107; }
    .table-responsive { overflow-x: auto; }
    .header-top { display: flex; align-items: center; gap: 16px; padding: 6px 20px; background: #2d3748; color: white; font-size: 13px; }
  </style>
</head>
<body class="hold-transition sidebar-mini layout-fixed" style="background:#f4f6f9;">

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="text-center text-white">
    <div class="spinner-border text-light mb-3" style="width:3rem;height:3rem;"></div>
    <div style="font-size:18px;">검색 중...</div>
  </div>
</div>

<div class="wrapper">
  <!-- Header -->
  <nav class="main-header navbar navbar-expand navbar-dark navbar-dark" style="background:#1a202c;">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
      </li>
      <li class="nav-item d-flex align-items-center ms-2">
        <i class="fas fa-shopping-cart me-2 text-warning"></i>
        <span class="font-weight-bold text-white">쇼핑검색 키워드 분석</span>
      </li>
    </ul>
    <ul class="navbar-nav ml-auto">
      <li class="nav-item d-flex align-items-center me-3">
        <span class="expiry-badge"><i class="fas fa-clock me-1"></i>만료일 : 2026-12-31</span>
      </li>
      <li class="nav-item d-flex align-items-center me-3">
        <span class="limit-badge text-white">네이버 : <span id="naver-count">0</span>/100</span>
        <span class="limit-badge text-white ms-3">쿠팡 : <span id="coupang-count">0</span>/0</span>
      </li>
      <li class="nav-item">
        <a href="#" class="nav-link text-white"><i class="fas fa-sign-out-alt"></i> 로그아웃</a>
      </li>
    </ul>
  </nav>

  <!-- Sidebar -->
  <aside class="main-sidebar sidebar-dark-primary elevation-4" style="background:#1a202c;">
    <a href="/" class="brand-link" style="background:#1a202c;">
      <i class="fas fa-shopping-bag brand-image text-warning" style="font-size:20px;"></i>
      <span class="brand-text font-weight-bold">쇼핑 분석툴</span>
    </a>
    <div class="sidebar">
      <nav class="mt-2">
        <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview">
          <li class="nav-item">
            <a href="/" class="nav-link active" style="background:#007bff;">
              <i class="nav-icon fas fa-search"></i>
              <p>키워드 검색</p>
            </a>
          </li>
        </ul>
      </nav>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="content-wrapper" style="min-height:100vh;">

    <!-- Search Bar -->
    <div class="search-bar">
      <div class="platform-tabs nav" id="platformTabs">
        <a class="nav-link active px-3 py-2 text-white" href="#" data-platform="naver" style="border-bottom: 3px solid #007bff;">
          <i class="fas fa-store me-1"></i> 네이버 쇼핑
        </a>
        <a class="nav-link px-3 py-2 text-secondary" href="#" data-platform="coupang">
          <i class="fas fa-rocket me-1"></i> 쿠팡
        </a>
      </div>
      <input type="text" id="keywordInput" class="form-control" placeholder="키워드 입력 (예: 현수막, 에어팟, 운동화)" style="max-width:360px;">
      <button class="btn btn-primary px-4" id="searchBtn">
        <i class="fas fa-search me-1"></i> 검색
      </button>
      <span id="resultCount" class="text-white text-sm"></span>
    </div>

    <!-- 확장프로그램 수집 안내 -->
    <div id="naverLinkBar" style="display:none;background:#1a2a3a;padding:10px 20px;display:none;align-items:center;gap:12px;flex-wrap:wrap;">
      <span style="color:#adb5bd;font-size:13px;">📊 리뷰 데이터 수집 → 판매량 추정 활성화:</span>
      <a id="naverShoppingLink" href="#" target="_blank"
         style="background:#03c75a;color:#fff;padding:6px 16px;border-radius:6px;font-size:13px;font-weight:700;text-decoration:none;">
        🛒 네이버 쇼핑에서 확인하기
      </a>
      <span id="collectStatus" style="color:#ffc107;font-size:12px;"></span>
    </div>

    <!-- Error Alert -->
    <div id="errorAlert" class="alert alert-danger mx-3 mt-3" style="display:none;"></div>

    <!-- Table -->
    <div class="content p-3">
      <div class="card card-outline card-primary">
        <div class="card-header d-flex align-items-center justify-content-between">
          <div class="d-flex align-items-center gap-2">
            <h3 class="card-title mb-0"><i class="fas fa-list me-2 text-primary"></i>검색 결과</h3>
            <span class="badge badge-primary ml-2" id="totalBadge"></span>
            <small id="scrapedAt" style="color:#adb5bd;font-size:11px;margin-left:8px;"></small>
          </div>
          <button class="btn btn-success btn-sm" id="excelBtn" onclick="downloadExcel()" style="display:none;">
            <i class="fas fa-file-excel me-1"></i> 엑셀파일다운로드
          </button>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table table-sm table-hover table-bordered mb-0" id="result-table">
              <thead class="thead-dark">
                <tr>
                  <th style="width:40px;text-align:center">#</th>
                  <th style="min-width:280px;">상품명</th>
                  <th style="min-width:180px;">카테고리</th>
                  <th style="width:90px;text-align:right">판매가</th>
                  <th style="width:110px;text-align:right">매출</th>
                  <th style="width:90px;text-align:right">판매건수</th>
                  <th style="width:90px;text-align:right">유입수</th>
                  <th style="width:80px;text-align:right">리뷰수</th>
                </tr>
              </thead>
              <tbody id="resultBody">
                <tr>
                  <td colspan="8" class="text-center text-muted py-5">
                    <i class="fas fa-search fa-2x mb-3 d-block"></i>
                    키워드를 입력하고 검색하세요
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="main-footer text-sm">
    <strong>쇼핑 키워드 분석툴</strong> &copy; 2026
    <div class="float-right text-muted">네이버 쇼핑 API 기반</div>
  </footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.0/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>

<script>
let currentPlatform = 'naver';
let naverCount = 0;
let currentKeyword = '';
let lastExtId = null;
let pollTimer = null;

// 플랫폼 탭 전환
$('#platformTabs .nav-link').click(function(e) {
  e.preventDefault();
  $('#platformTabs .nav-link').removeClass('active text-white').addClass('text-secondary').css('border-bottom', 'none');
  $(this).addClass('active text-white').removeClass('text-secondary').css('border-bottom', '3px solid #007bff');
  currentPlatform = $(this).data('platform');
});

// 엔터 검색
$('#keywordInput').keypress(function(e) {
  if (e.which === 13) doSearch();
});

$('#searchBtn').click(doSearch);

function doSearch() {
  const keyword = $('#keywordInput').val().trim();
  if (!keyword) {
    alert('키워드를 입력하세요.');
    return;
  }

  $('#loadingOverlay').addClass('show');
  $('#errorAlert').hide();
  $('#resultBody').html('<tr><td colspan="21" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr>');
  $('#totalBadge').text('');
  $('#resultCount').text('');

  $.ajax({
    url: '/search',
    method: 'POST',
    contentType: 'application/json',
    data: JSON.stringify({ keyword: keyword, platform: currentPlatform }),
    success: function(res) {
      $('#loadingOverlay').removeClass('show');
      if (res.error) {
        $('#errorAlert').text('⚠️ ' + res.error).show();
        $('#resultBody').html('<tr><td colspan="21" class="text-center text-muted py-4">결과 없음</td></tr>');
        return;
      }
      if (currentPlatform === 'naver') {
        naverCount++;
        $('#naver-count').text(naverCount);
      }
      currentKeyword = keyword;
      renderTable(res.results, false);
      $('#totalBadge').text(res.total + '개');
      $('#resultCount').text(keyword + ' — ' + res.total + '개 결과');
      $('#excelBtn').show();
      const naverUrl = 'https://search.shopping.naver.com/search/all?query=' + encodeURIComponent(keyword) + '&sort=rel';
      $('#naverShoppingLink').attr('href', naverUrl);
      $('#naverLinkBar').css('display', 'flex');
      $('#collectStatus').text('확장프로그램이 자동으로 실제 데이터를 수집합니다...');
      startPolling();
    },
    error: function() {
      $('#loadingOverlay').removeClass('show');
      $('#errorAlert').text('서버 오류가 발생했습니다.').show();
    }
  });
}

// ── 확장프로그램 폴링 ────────────────────────────────────────────────────────
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  let waited = 0;
  pollTimer = setInterval(async function() {
    waited += 2;
    try {
      const res = await fetch('/api/analysis/latest');
      const data = await res.json();
      if (data.session && data.session.id !== lastExtId) {
        const kw = (data.session.keyword || '').trim();
        // 키워드가 현재 검색어와 일치하면 업데이트
        if (kw === currentKeyword || kw.includes(currentKeyword) || currentKeyword.includes(kw)) {
          lastExtId = data.session.id;
          renderTable(data.products, true);
          $('#totalBadge').text(data.products.length + '개');
          $('#scrapedAt').text('데이터 조회시간 : ' + (data.session.scraped_at || '').replace('T',' ').slice(0,19));
          $('#collectStatus').text('✓ 실제 데이터 수집 완료').css('color','#28a745');
          clearInterval(pollTimer);
        }
      }
    } catch(e) {}
    if (waited >= 60) clearInterval(pollTimer);
  }, 2000);
}


let currentItems = [];

function fmt(n) {
  if (n == null || n === '' || n === '-' || n === 0) return '-';
  if (typeof n === 'string') return n;
  return parseInt(n).toLocaleString();
}

function renderTable(items, fromExt) {
  if (!items || items.length === 0) {
    $('#resultBody').html('<tr><td colspan="8" class="text-center text-muted py-4">검색 결과가 없습니다.</td></tr>');
    return;
  }
  currentItems = items;
  let html = '';
  let seq = 0;
  items.forEach(function(item) {
    const isAd = item.isAd || item.is_ad;
    if (!isAd) seq++;
    const rankLabel = isAd
      ? '<span style="color:#d97706;font-size:10px;font-weight:700">AD</span>'
      : `<span class="rank-num ${seq<=3?'rank-'+seq:''}">${seq}</span>`;

    const title  = item.title || '';
    const link   = item.url || item.link || '#';
    const cat    = item.category || '';
    const price  = item.price || 0;
    const rev    = parseInt(item.review) || 0;
    const sales  = parseInt(item.sales_count) || 0;
    const revenue= parseInt(item.revenue) || (price * sales);
    const traffic= parseInt(item.est_traffic || item.actual_traffic) || 0;

    const salesStr   = sales   > 0 ? sales.toLocaleString()   : '-';
    const revenueStr = revenue > 0 ? revenue.toLocaleString() : '-';
    const trafficStr = traffic > 0 ? traffic.toLocaleString() : '-';
    const revStr     = rev     > 0 ? rev.toLocaleString()     : '-';
    const priceStr   = price   > 0 ? price.toLocaleString()   : '-';

    html += `<tr data-rank="${seq}">
      <td style="text-align:center">${rankLabel}</td>
      <td class="text-left">
        <a href="${link}" target="_blank" style="color:#1a56db;font-size:13px;" title="${title}">${title}</a>
        ${isAd ? '<span style="font-size:10px;color:#d97706;margin-left:4px">[광고]</span>' : ''}
      </td>
      <td style="font-size:11px;color:#6b7280">${cat}</td>
      <td style="text-align:right">${priceStr}</td>
      <td style="text-align:right;font-weight:600">${revenueStr}</td>
      <td style="text-align:right;font-weight:600;color:#1a56db">${salesStr}</td>
      <td style="text-align:right">${trafficStr}</td>
      <td style="text-align:right">${revStr}</td>
    </tr>`;
  });
  $('#resultBody').html(html);
}

function downloadExcel() {
  if (!currentItems.length) return;
  const headers = ['#','상품명','카테고리','판매가','매출','판매건수','유입수','리뷰수'];
  let seq = 0;
  const rows = currentItems.map(p => {
    const isAd = p.isAd || p.is_ad;
    if (!isAd) seq++;
    const price = parseInt(p.price)||0, sales = parseInt(p.sales_count)||0;
    return [
      isAd ? 'AD' : seq,
      p.title || '',
      p.category || '',
      price || '',
      p.revenue || (price*sales) || '',
      sales || '',
      parseInt(p.est_traffic||p.actual_traffic)||'',
      parseInt(p.review)||'',
    ];
  });
  const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (currentKeyword||'결과') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
</body>
</html>
